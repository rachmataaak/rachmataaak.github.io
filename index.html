<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rachmat Andi Koro | Technology Specialist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .name-title {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .typewriter-container {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: var(--accent-color);
            min-height: 1.6em;
        }

        /* Container & Cards */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            margin-bottom: 3rem;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '';
            width: 30px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        .expertise-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .skill-card {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            transition: transform 0.3s;
        }

        .skill-card:hover {
            transform: scale(1.05);
            background: rgba(56, 189, 248, 0.1);
        }

        .skill-card h3 {
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        /* Projects Section */
        .project-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.02);
            border-left: 4px solid var(--accent-color);
            padding: 1.5rem;
            border-radius: 0 16px 16px 0;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            background: rgba(56, 189, 248, 0.05);
            transform: translateX(10px);
        }

        .project-card h3 {
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            font-size: 1.25rem;
        }

        .btn-contact {
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            background: var(--accent-color);
            color: var(--bg-color);
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-contact:hover {
            box-shadow: 0 0 20px var(--accent-color);
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .name-title { font-size: 2.5rem; }
            .expertise-grid { grid-template-columns: 1fr; }
            section { padding: 2rem 1.5rem; }
        }
    </style>
</head>
